name: my_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  flutter_svg: ^2.2.0

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  carousel_slider: ^5.1.1
  google_generative_ai: ^0.4.7
  shared_preferences: ^2.5.3
  flutter_dotenv: ^6.0.0
  url_launcher: ^6.3.2
  image_picker: ^1.2.1
  emoji_picker_flutter: ^4.4.0
  sqflite: ^2.4.2
  path: ^1.9.1
  flutter_local_notifications: ^20.0.0
  workmanager: ^0.9.0+3
  http: ^1.6.0
  google_mlkit_entity_extraction: ^0.15.3
  permission_handler: ^12.0.1
  android_intent_plus: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_timezone: ^5.0.2
  google_mlkit_object_detection: ^0.15.1
  tflite_flutter: ^0.12.1
  flutter_tts: ^4.2.5
  speech_to_text: ^7.3.0
  geolocator: ^14.0.2
  sensors_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - .env
    - assets/models/mobilenet.tflite
    - assets/models/visual_aide_model.tflite

  fonts:
      - family: Inter
        fonts:
          - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf

      - family: Forum
        fonts:
          - asset: assets/fonts/Forum/Forum-Regular.ttf

      - family: Raleway
        fonts:
          - asset: assets/fonts/Raleway/static/Raleway-Regular.ttf

      - family: NataSans
        fonts:
          - asset: assets/fonts/Nata_Sans/static/NataSans-Regular.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.jpg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.jpg"

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/splash.jpg
  android: true
  ios: true
  fullscreen: true
  android_12:
    image: "assets/images/splash.jpg"
    color: "#ffffff"

  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
